kind = "web"
previewPath = "/"
title = "Sistema de Gestão Empresarial"
version = "1.0.0"
id = "artifacts/gestao"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24901
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/gestao run dev"

[services.env]
PORT = "24901"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/gestao", "run", "build"]
publicDir = "artifacts/gestao/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
